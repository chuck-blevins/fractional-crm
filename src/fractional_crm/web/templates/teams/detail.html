{% extends "base.html" %}
{% block title %}{{ team.name }}{% endblock %}
{% block content %}
<h1>{{ team.name }}</h1>

{% if error %}
<p role="alert">{{ error }}</p>
{% endif %}

<h2>Members</h2>
{% include "teams/_roster.html" %}

<h2>Add a member</h2>
<form method="post" action="/teams/{{ team.id }}/members">
  <label for="name">Name</label>
  <input type="text" id="name" name="name" value="{{ form.get("name", "") }}" required>

  <label for="email">Email</label>
  <input type="email" id="email" name="email" value="{{ form.get("email", "") }}" required>

  <label for="role">Role</label>
  <select id="role" name="role">
    {% for r in roles %}
      <option value="{{ r }}" {% if form.get("role") == r %}selected{% endif %}>{{ r }}</option>
    {% endfor %}
  </select>

  <button type="submit">Add member</button>
</form>

<p><a href="/teams">Back to teams</a></p>
{% endblock %}
