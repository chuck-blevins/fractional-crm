{% if members %}
<table id="roster">
  <caption>Members</caption>
  <thead>
    <tr>
      <th scope="col">Name</th>
      <th scope="col">Email</th>
      <th scope="col">Role</th>
    </tr>
  </thead>
  <tbody>
    {% for m in members %}
      <tr>
        <td>{{ m.name }}</td>
        <td>{{ m.email }}</td>
        <td>{{ m.role }}</td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p>No members yet</p>
{% endif %}
