{% extends "base.html" %}
{% block title %}Dashboard · Fractional CRM{% endblock %}
{% block content %}
<h1>Dashboard</h1>
<p>Welcome back. Pick a section from the navigation to get started.</p>
<section aria-label="Overview">
  <div>
    <h2>Active engagements</h2>
    <p data-testid="dash-active-count">{{ active_count }}</p>
  </div>
  <div>
    <h2>Monthly run-rate</h2>
    <p data-testid="dash-run-rate">${{ "{:,.0f}".format(monthly_run_rate) }}</p>
  </div>
</section>
{% endblock %}
